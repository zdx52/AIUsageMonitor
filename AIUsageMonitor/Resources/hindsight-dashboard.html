<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Hindsight</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: clamp(9px, 1.3vw, 18px); }
  body {
    font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
    background: #0f1117; color: #e1e4eb;
    height: 100vh; display: flex; flex-direction: column;
    user-select: none;
  }
  .bar {
    display: flex; align-items: center; padding: 0.8rem 1.4rem;
    background: rgba(26,29,39,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(42,45,58,0.5);
    flex-shrink: 0;
  }
  .bar h1 {
    font-size: 1.2rem; font-weight: 700;
    background: linear-gradient(135deg, #e1e4eb 0%, #6c8cff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .bar .ver {
    margin-left: 0.8rem; font-size: 0.8rem; color: #6c8cff;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .bar .ver .badge {
    font-size: 0.7rem; padding: 0.1rem 0.5rem;
    border-radius: 0.4rem; background: rgba(251,146,60,0.15);
    border: 1px solid rgba(251,146,60,0.4);
    color: #fb923c; cursor: pointer; white-space: nowrap;
  }
  .bar .ver .badge:hover { background: rgba(251,146,60,0.25); }
  .bar .st {
    margin-left: auto; display: flex; align-items: center; gap: 0.3rem;
    font-size: 0.85rem; color: #8b8fa3;
  }
  .bar .st .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; }
  .dot.ok { background: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,0.5); }
  .dot.bad { background: #ef4444; }

  .srch {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 1.4rem;
    border-bottom: 1px solid #2a2d3a;
    flex-shrink: 0;
  }
  .srch input {
    flex:1; background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 0.6rem; padding: 0.6rem 0.9rem; color: #e1e4eb;
    font-size: 1rem; outline: none; transition: .2s;
  }
  .srch input:focus { border-color: #6c8cff; box-shadow: 0 0 16px rgba(108,140,255,0.15); }
  .srch .rbtn {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 0.6rem; width: 2.6rem; height: 2.6rem;
    color: #8b8fa3; cursor: pointer; font-size: 1.2rem;
    display: flex; align-items: center; justify-content: center;
    transition: .2s;
  }
  .srch .rbtn:hover { border-color: #6c8cff; color: #e1e4eb; }

  .pg { flex: 1; overflow-y: auto; }

  /* Home */
  .hm {
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    flex: 1; padding: 1.2rem;
  }
  .hm-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 0.6rem;
    width: 100%;
    max-width: min(54rem, 100%);
    margin: 0 auto;
  }
  .hm-btn {
    background: linear-gradient(135deg, #1a1d27 0%, #1e2130 100%);
    border: 1px solid #2a2d3a;
    border-radius: 0.9rem;
    padding: 1rem 0.9rem;
    cursor: pointer;
    text-align: center;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
  }
  .hm-btn.emp { opacity: 0.45; cursor: default; }
  .hm-btn.emp:hover { border-color: #2a2d3a; transform: none; box-shadow: none; }
  .hm-btn::after {
    content: ''; position: absolute; inset:0;
    background: linear-gradient(135deg,transparent 0%,rgba(108,140,255,0.04) 100%);
    opacity:0; transition: opacity .3s;
  }
  .hm-btn:hover:not(.emp) {
    border-color: rgba(108,140,255,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .hm-btn:hover:not(.emp)::after { opacity:1; }

  /* 全部记忆 */
  .hm-btn.span2 {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 1rem;
    text-align: left; padding: 1rem 1.4rem;
  }
  .hm-btn .icon {
    width: 3rem; height: 3rem; border-radius: 0.7rem;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin: 0 auto 0.4rem;
  }
  .hm-btn.span2 .icon { margin: 0; flex-shrink: 0; width: 2.8rem; height: 2.8rem; font-size: 1.4rem; border-radius: 0.7rem; }
  .hm-btn .num { font-size: 1.6rem; font-weight: 700; line-height: 1.1; }
  .hm-btn .lbl { font-size: 0.85rem; color: #8b8fa3; margin-top: 0.2rem; }
  .hm-btn.span2 .info .lbl { margin-top:0; font-size: 1.1rem; font-weight: 700; color:#e1e4eb; }
  .hm-btn.span2 .info .sub { font-size: 0.85rem; color: #8b8fa3; margin-top: 0.15rem; }
  .hm-btn.span2 .arrow { font-size: 1.4rem; color: #4a4d5a; transition: all .2s; }

  .hm-btn .num.all { color: #6c8cff; }
  .hm-btn .num.exp { color: #fb923c; }
  .hm-btn .num.obs { color: #a78bfa; }
  .hm-btn .num.wld { color: #60a5fa; }
  .hm-btn .num.men { color: #f472b6; }

  /* Detail */
  .dh {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.7rem 1.2rem;
    border-bottom: 1px solid #2a2d3a;
    background: #1a1d27;
    position: sticky; top: 0; z-index: 10;
    flex-shrink: 0;
  }
  .dh .bk {
    width: 2.2rem; height: 2.2rem; border-radius: 0.5rem;
    background: #0f1117; border: 1px solid #2a2d3a;
    color: #8b8fa3; font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .dh .bk:hover { border-color: #6c8cff; color: #e1e4eb; }
  .dh h2 { font-size: 1.1rem; font-weight: 600; }
  .dh .n { font-size: 0.9rem; color: #8b8fa3; margin-left: auto; }

  .ml { padding: 0.6rem 0.9rem; }
  .mi {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 0.7rem; padding: 0.7rem 1rem;
    margin-bottom: 0.4rem; cursor: pointer;
  }
  .mi:hover { border-color: #6c8cff; }
  .mi .tx { font-size: 1rem; line-height: 1.5; }
  .mi .mt {
    display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap;
    margin-top: 0.4rem; font-size: 0.8rem; color: #8b8fa3;
  }
  .mi .mt .tag {
    background: rgba(108,140,255,0.1); border: 1px solid rgba(108,140,255,0.2);
    border-radius: 0.25rem; padding: 0.1rem 0.5rem; color: #6c8cff;
  }
  .mi .mt .tm { margin-left: auto; white-space: nowrap; }

  .lo {
    display: flex; align-items: center; justify-content: center;
    gap: 0.9rem; padding: 3rem 1.5rem; color: #8b8fa3;
  }
  .lo .sp { width: 1.5rem; height: 1.5rem; border: 2px solid #2a2d3a; border-top-color: #6c8cff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="bar">
  <h1>🧠 Hindsight</h1>
  <span class="ver" id="hver"></span>
  <div class="st">
    <span class="dot ok" id="hdot"></span>
    <span id="hst">就绪</span>
  </div>
</div>
<div class="srch">
  <input id="sq" placeholder="搜索记忆..." autofocus>
  <button class="rbtn" id="sr" title="刷新">↻</button>
</div>
<div class="pg" id="pg">
</div>
<script>
const API = '';
let allMemories = [], entities = new Map();
// 统计缓存（来自 /api/stats，准确不截断）
let statsCache = null;

function h(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function ap(m,u,b){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(API+u,o);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

function showHome(){
  // 优先用 stats 的准确计数，fallback 到内存列表计数
  const s = statsCache;
  const total = s ? s.total_nodes : allMemories.length;
  const byType = s ? (s.nodes_by_fact_type||{}) : {};
  const exp = s ? (byType.experience||0) : allMemories.filter(m=>m.fact_type==='experience').length;
  const obs = s ? (byType.observation||0) : allMemories.filter(m=>m.fact_type==='observation').length;
  const wld = s ? (byType.world||0) : allMemories.filter(m=>m.fact_type==='world').length;
  const men = allMemories.filter(m=>m.fact_type==='mental_model').length;
  const cats=[
    {k:'all',n:'所有记忆',c:total,ic:'📚',cls:'all'},
    {k:'experience',n:'经验',c:exp,ic:'💡',cls:'exp'},
    {k:'observation',n:'观察',c:obs,ic:'👁️',cls:'obs'},
    {k:'world',n:'世界知识',c:wld,ic:'🌍',cls:'wld'},
  ];
  cats.push({k:'mental_model',n:'心智模型',c:men,ic:'🧩',cls:'men'});

  pg.innerHTML=`
  <div class="hm" id="hm">
    <div class="hm-grid">
      ${cats.map(c=>c.k==='all'?`
        <div class="hm-btn span2" data-k="${c.k}">
          <div class="icon" style="background:rgba(108,140,255,0.1)">${c.ic}</div>
          <div class="info">
            <div class="lbl">${c.n}</div>
            <div class="sub">${c.c} 条记忆</div>
          </div>
          <span class="arrow">→</span>
        </div>`:`
        <div class="hm-btn${c.c===0?' emp':''}" data-k="${c.k}">
          <div class="icon" style="background:rgba(108,140,255,0.08)">${c.ic}</div>
          <div class="num ${c.cls}">${c.c}</div>
          <div class="lbl">${c.n}</div>
        </div>`).join('')}
    </div>
  </div>`;
  pg.querySelectorAll('.hm-btn:not(.emp)').forEach(b=>b.onclick=()=>showList(b.dataset.k));
}

function showList(kind){
  const items = kind==='all' ? allMemories : allMemories.filter(m=>m.fact_type===kind);
  const label = kind==='all'?'所有记忆':kind==='experience'?'经验':kind==='observation'?'观察':kind==='world'?'世界知识':'其他';
  // 优先用 stats 的准确计数（与首页一致），fallback 到列表实际长度
  const s = statsCache;
  const count = kind==='all' ? (s?.total_nodes||items.length)
    : kind==='experience' ? (s?.nodes_by_fact_type?.experience||items.length)
    : kind==='observation' ? (s?.nodes_by_fact_type?.observation||items.length)
    : kind==='world' ? (s?.nodes_by_fact_type?.world||items.length)
    : items.length;
  pg.innerHTML=`
  <div class="dh">
    <button class="bk" id="bk">←</button>
    <h2>${label}</h2>
    <span class="n">${count}</span>
  </div>
  <div class="ml">${items.map(m=>{
    const es = typeof m.entities==='string' ? m.entities.split(',').map(s=>s.trim()).filter(Boolean) : (m.entities||[]);
    const ts = m.date ? new Date(m.date).toLocaleDateString('zh-CN') : '';
    const txt = (m.content||m.text||'').slice(0,120);
    return `<div class="mi" data-id="${m.id||''}">
      <div class="tx">${h(txt)}${(m.content||m.text||'').length>120?'...':''}</div>
      <div class="mt">${es.slice(0,4).map(e=>`<span class="tag">${h(e)}</span>`).join('')}${es.length>4?`<span class="tag">+${es.length-4}</span>`:''}<span class="tm">${ts}</span></div>
    </div>`;
  }).join('')}</div>`;
  document.getElementById('bk').onclick=showHome;
  pg.querySelectorAll('.mi').forEach(el=>el.onclick=()=>showDetail(el.dataset.id));
}

function showDetail(id){
  const m = allMemories.find(x=>(x.id||'')===id);
  if(!m) return;
  const es = typeof m.entities==='string' ? m.entities.split(',').map(s=>s.trim()).filter(Boolean) : (m.entities||[]);
  const ts = m.date ? new Date(m.date).toLocaleString('zh-CN') : '';
  const txt = m.content||m.text||'';
  pg.innerHTML=`
  <div class="dh">
    <button class="bk" id="bk">←</button>
    <h2>详情</h2>
  </div>
  <div style="padding:1.2rem 1.4rem;font-size:1.1rem;line-height:1.7;">${h(txt)}</div>
  <div style="padding:0 1.4rem 1.2rem;display:flex;flex-wrap:wrap;gap:0.3rem;">${es.slice(0,8).map(e=>`<span style="background:rgba(108,140,255,0.1);border:1px solid rgba(108,140,255,0.2);border-radius:0.25rem;padding:0.1rem 0.6rem;font-size:0.85rem;color:#6c8cff;">${h(e)}</span>`).join('')}</div>
  <div style="padding:0 1.4rem 1.2rem;font-size:0.9rem;color:#8b8fa3;">${ts}</div>`;
  document.getElementById('bk').onclick=()=>showList(m.fact_type);
}

async function load(skipList){
  // 1. 先获取 stats（瞬时、准确），立刻渲染首页
  try {
    statsCache = await ap('GET','/api/stats');
    document.getElementById('hst').textContent = `共 ${statsCache.total_nodes} 条`;
    document.getElementById('hdot').className = 'dot ok';
    showHome();
  } catch(e){ statsCache = null; }

  // 2. 后台加载全部记忆列表，供浏览/搜索（autoRefresh 时跳过）
  if(!skipList && !allMemories.length){
    try {
      const d = await ap('GET','/api/memories/list?limit=10000');
      allMemories = d.memories||d.data||d.items||d.results||[];
    } catch(e){ allMemories=[]; }
  }
  // 更新状态栏（stats 失败时 fallback）并重绘（mental_model 来自列表）
  document.getElementById('hst').textContent = `共 ${Math.max(statsCache?.total_nodes||0, allMemories.length)} 条`;
  showHome();
  // 首次版本检查
  checkVersion();
}

// === 自动刷新（与 Hindsight 标签的刷新间隔同步）===
let autoRefreshTimer = null;
let refreshIntervalMs = 5 * 60 * 1000;  // 默认 5 分钟

function startAutoRefresh(ms) {
  if (ms && ms > 0) refreshIntervalMs = ms;
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(async () => {
    // 静默刷新 stats，不打断用户当前浏览的页面
    try {
      const s = await ap('GET','/api/stats');
      statsCache = s;
      // 如果用户在首页，更新显示
      const hm = document.getElementById('hm');
      if (hm) {
        document.getElementById('hst').textContent = `共 ${s.total_nodes} 条`;
        showHome();
      }
    } catch(e) { /* 静默失败，下次重试 */ }
  }, refreshIntervalMs);
}

// Swift 端注入设置覆盖刷新间隔
window.hsSetRefreshInterval = function(ms) {
  startAutoRefresh(ms);
};

// === 自动版本检查 ===
let verState = { current: null, latest: null, hasUpdate: false };

async function checkVersion(){
  const el = document.getElementById('hver');
  if(!el) return;
  try {
    const d = await ap('GET','/check-update');
    verState.current = d.current;
    verState.latest = d.latest;
    verState.hasUpdate = d.has_update;
    el.innerHTML = `v${h(d.current)}`;
    if(d.has_update){
      el.innerHTML += `<span class="badge" id="hup-badge" onclick="window.webkit?window.webkit.messageHandlers.hsAction.postMessage('check'):location.reload()">⬆ v${h(d.latest)} 可用</span>`;
    }
    if(d.error) console.warn('版本检查:', d.error);
  } catch(e){
    const cur = verState.current;
    el.innerHTML = cur ? `v${h(cur)}` : '';
  }
}

// 每 2 小时自动检查一次
setInterval(checkVersion, 2 * 60 * 60 * 1000);

document.getElementById('sq').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  if(!q){ showHome(); return; }
  const f = allMemories.filter(m=>(m.content||m.text||'').toLowerCase().includes(q)||(m.entities||[]).some(e=>e.toLowerCase().includes(q)));
  pg.innerHTML=`<div class="dh"><h2>搜索结果</h2><span class="n">${f.length}</span></div><div class="ml">${f.map(m=>{
    const ts = m.date ? new Date(m.date).toLocaleDateString('zh-CN') : '';
    return `<div class="mi"><div class="tx">${h((m.content||m.text||'').slice(0,120))}</div><div class="mt"><span class="tm">${ts}</span></div></div>`;
  }).join('')}</div>`;
});

document.getElementById('sr').onclick=()=>{ load(); };

load();
// 启动自动刷新（Swift 端稍后会注入用户设置的实际间隔）
startAutoRefresh();
</script>
</body>
</html>
