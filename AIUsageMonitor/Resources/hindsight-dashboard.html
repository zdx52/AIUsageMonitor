<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Hindsight</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: clamp(9px, 1.3vw, 18px); }
  body {
    font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
    background: #0f1117; color: #e1e4eb;
    height: 100vh; display: flex; flex-direction: column;
    user-select: none;
  }

  /* ───── 搜索栏 ───── */
  .srch {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 1.2rem;
    border-bottom: 1px solid #2a2d3a;
    flex-shrink: 0;
    background: linear-gradient(180deg, rgba(26,29,39,0.3) 0%, transparent 100%);
  }
  .srch input {
    flex:1; background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 0.7rem; padding: 0.7rem 1rem; color: #e1e4eb;
    font-size: 1rem; outline: none; transition: .2s;
  }
  .srch input:focus { border-color: #6c8cff; box-shadow: 0 0 16px rgba(108,140,255,0.15); }
  .srch .rbtn {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 0.7rem; width: 2.8rem; height: 2.8rem;
    color: #8b8fa3; cursor: pointer; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    transition: .2s;
  }
  .srch .rbtn:hover { border-color: #6c8cff; color: #e1e4eb; background: #1e2130; }

  /* ───── 内容区 ───── */
  .pg { flex: 1; overflow-y: auto; }

  /* ───── 首页(Home) ───── */
  .hm {
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    flex: 1; padding: 1rem 1.4rem;
  }
  .hm-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 0.7rem;
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
  }
  .hm-btn {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 0.9rem;
    padding: 1.2rem 0.9rem;
    cursor: pointer;
    text-align: center;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
  }
  .hm-btn.emp { opacity: 0.4; cursor: default; }
  .hm-btn.emp:hover { border-color: #2a2d3a; transform: none; box-shadow: none; }
  .hm-btn:hover:not(.emp) {
    border-color: rgba(108,140,255,0.35);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    background: #1e2130;
  }
  /* 全部记忆 - 占一整行 */
  .hm-btn.span2 {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 1.2rem;
    text-align: left; padding: 1.2rem 1.4rem;
  }
  .hm-btn .icon {
    width: 3rem; height: 3rem; border-radius: 0.7rem;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin: 0 auto 0.4rem;
  }
  .hm-btn.span2 .icon { margin: 0; flex-shrink: 0; width: 3rem; height: 3rem; font-size: 1.4rem; }
  .hm-btn .num { font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
  .hm-btn .lbl { font-size: 0.85rem; color: #8b8fa3; margin-top: 0.25rem; }
  .hm-btn.span2 .info .lbl { margin-top:0; font-size: 1.1rem; font-weight: 600; color:#e1e4eb; }
  .hm-btn.span2 .info .sub { font-size: 0.9rem; color: #8b8fa3; margin-top: 0.15rem; }
  .hm-btn.span2 .arrow { font-size: 1.3rem; color: #4a4d5a; transition: all .2s; }
  .hm-btn.span2:hover .arrow { color: #6c8cff; transform: translateX(3px); }

  .hm-btn .num.all { color: #6c8cff; }
  .hm-btn .num.exp { color: #fb923c; }
  .hm-btn .num.obs { color: #a78bfa; }
  .hm-btn .num.wld { color: #60a5fa; }
  .hm-btn .num.men { color: #f472b6; }

  /* ───── 列表页 ───── */
  .dh {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid #2a2d3a;
    background: #1a1d27;
    position: sticky; top: 0; z-index: 10;
    flex-shrink: 0;
  }
  .dh .bk {
    width: 2rem; height: 2rem; border-radius: 0.4rem;
    background: #0f1117; border: 1px solid #2a2d3a;
    color: #8b8fa3; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: .2s;
  }
  .dh .bk:hover { border-color: #6c8cff; color: #e1e4eb; }
  .dh h2 { font-size: 1rem; font-weight: 600; }
  .dh .n { font-size: 0.85rem; color: #8b8fa3; margin-left: auto; }

  .ml { padding: 0.4rem 0.8rem; }
  .mi {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 0.6rem; padding: 0.6rem 0.9rem;
    margin-bottom: 0.35rem; cursor: pointer; transition: .2s;
  }
  .mi:hover { border-color: rgba(108,140,255,0.3); background: #1e2130; }
  .mi .tx { font-size: 0.9rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .mi .mt {
    display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap;
    margin-top: 0.35rem; font-size: 0.75rem; color: #8b8fa3;
  }
  .mi .mt .tag {
    background: rgba(108,140,255,0.1); border: 1px solid rgba(108,140,255,0.15);
    border-radius: 0.25rem; padding: 0.05rem 0.4rem; color: #6c8cff;
  }
  .mi .mt .tm { margin-left: auto; white-space: nowrap; }

  /* ───── 详情页 ───── */
  .dt { padding: 1rem 1.2rem; }
  .dt .txt {
    font-size: 1rem; line-height: 1.7; white-space: pre-wrap;
    color: #e1e4eb; user-select: text;
  }
  .dt .tags {
    display: flex; flex-wrap: wrap; gap: 0.3rem;
    margin-top: 1rem; padding-top: 0.8rem;
    border-top: 1px solid #2a2d3a;
  }
  .dt .tags .tag {
    background: rgba(108,140,255,0.1); border: 1px solid rgba(108,140,255,0.15);
    border-radius: 0.25rem; padding: 0.05rem 0.5rem;
    font-size: 0.8rem; color: #6c8cff;
  }
  .dt .time {
    margin-top: 0.5rem; font-size: 0.8rem; color: #5a5d6a;
  }

  /* ───── 加载/空状态 ───── */
  .lo {
    display: flex; align-items: center; justify-content: center;
    gap: 0.8rem; padding: 2.5rem 1.5rem; color: #8b8fa3;
  }
  .lo .sp { width: 1.3rem; height: 1.3rem; border: 2px solid #2a2d3a; border-top-color: #6c8cff; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- 搜索栏（顶栏由 Swift 注入，此处只留搜索） -->
<div class="srch">
  <input id="sq" placeholder="🔍  搜索记忆..." autofocus>
  <button class="rbtn" id="sr" title="刷新">↻</button>
</div>

<!-- 内容区域 -->
<div class="pg" id="pg"></div>

<!-- 隐藏状态元素，供 JS 引用（实际展示在 Swift 注入的顶栏） -->
<span id="hst" style="display:none"></span>
<span id="hver" style="display:none"></span>
<span id="hdot" style="display:none"></span>

<script>
const API = '';
let allMemories = [], entities = new Map();
let mentalModels = [];
let statsCache = null;

function h(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function ap(m,u,b){
  const o={method:m,headers:{'Content-Type':'application/json'}};
  if(b) o.body=JSON.stringify(b);
  const r=await fetch(API+u,o);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

function updateStatusBar(text, color) {
  // 更新 Swift 注入的状态栏
  const el = document.getElementById('hs-status');
  if (el) el.textContent = text;
  if (color) el.style.color = color;
}

function showHome(){
  const s = statsCache;
  const total = s ? s.total_nodes : allMemories.length;
  const byType = s ? (s.nodes_by_fact_type||{}) : {};
  const exp = s ? (byType.experience||0) : allMemories.filter(m=>m.fact_type==='experience').length;
  const obs = s ? (byType.observation||0) : allMemories.filter(m=>m.fact_type==='observation').length;
  const wld = s ? (byType.world||0) : allMemories.filter(m=>m.fact_type==='world').length;
  const men = mentalModels.length;
  const cats=[
    {k:'all',n:'所有记忆',c:total,ic:'📚',cls:'all'},
    {k:'experience',n:'经验',c:exp,ic:'💡',cls:'exp'},
    {k:'observation',n:'观察',c:obs,ic:'👁️',cls:'obs'},
    {k:'world',n:'世界知识',c:wld,ic:'🌍',cls:'wld'},
    {k:'mental_model',n:'心智模型',c:men,ic:'🧩',cls:'men'},
  ];

  pg.innerHTML=`
  <div class="hm" id="hm">
    <div class="hm-grid">
      ${cats.map(c=>c.k==='all'?`
        <div class="hm-btn span2" data-k="${c.k}">
          <div class="icon" style="background:rgba(108,140,255,0.1)">${c.ic}</div>
          <div class="info">
            <div class="lbl">${c.n}</div>
            <div class="sub">${c.c} 条记忆</div>
          </div>
          <span class="arrow">→</span>
        </div>`:`
        <div class="hm-btn${c.c===0?' emp':''}" data-k="${c.k}">
          <div class="icon" style="background:rgba(108,140,255,0.07)">${c.ic}</div>
          <div class="num ${c.cls}">${c.c}</div>
          <div class="lbl">${c.n}</div>
        </div>`).join('')}
    </div>
  </div>`;
  pg.querySelectorAll('.hm-btn:not(.emp)').forEach(b=>b.onclick=()=>showList(b.dataset.k));
}

function showList(kind){
  const isMental = kind==='mental_model';
  const items = isMental ? mentalModels : (kind==='all' ? allMemories : allMemories.filter(m=>m.fact_type===kind));
  const label = kind==='all'?'所有记忆':kind==='experience'?'经验':kind==='observation'?'观察':kind==='world'?'世界知识':'心智模型';
  const s = statsCache;
  const count = kind==='all' ? (s?.total_nodes||items.length)
    : kind==='experience' ? (s?.nodes_by_fact_type?.experience||items.length)
    : kind==='observation' ? (s?.nodes_by_fact_type?.observation||items.length)
    : kind==='world' ? (s?.nodes_by_fact_type?.world||items.length)
    : items.length;
  pg.innerHTML=`
  <div class="dh">
    <button class="bk" id="bk">←</button>
    <h2>${label}</h2>
    <span class="n">${count}</span>
  </div>
  <div class="ml">${items.map(m=>{
    const es = isMental ? (m.tags||[]) : (typeof m.entities==='string' ? m.entities.split(',').map(s=>s.trim()).filter(Boolean) : (m.entities||[]));
    const ts = isMental ? (m.created_at ? new Date(m.created_at).toLocaleDateString('zh-CN') : '') : (m.date ? new Date(m.date).toLocaleDateString('zh-CN') : '');
    const txt = isMental ? (m.name||'') : (m.content||m.text||'').slice(0,120);
    return `<div class="mi" data-id="${m.id||''}">
      <div class="tx">${isMental ? '🧩 ' + h(txt) : h(txt)}${!isMental && (m.content||m.text||'').length>120?'...':''}</div>
      <div class="mt">${es.slice(0,4).map(e=>`<span class="tag">${h(e)}</span>`).join('')}${es.length>4?`<span class="tag">+${es.length-4}</span>`:''}<span class="tm">${ts}</span></div>
    </div>`;
  }).join('')}</div>`;
  document.getElementById('bk').onclick=showHome;
  pg.querySelectorAll('.mi').forEach(el=>el.onclick=()=>showDetail(el.dataset.id));
}

function showDetail(id){
  let m = allMemories.find(x=>(x.id||'')===id);
  let isMental = false;
  if(!m){ m = mentalModels.find(x=>(x.id||'')===id); isMental = !!m; }
  if(!m) return;
  const es = isMental ? (m.tags||[]) : (typeof m.entities==='string' ? m.entities.split(',').map(s=>s.trim()).filter(Boolean) : (m.entities||[]));
  const ts = isMental ? (m.created_at ? new Date(m.created_at).toLocaleString('zh-CN') : '') : (m.date ? new Date(m.date).toLocaleString('zh-CN') : '');
  const txt = isMental ? ('🧩 ' + (m.name||'') + '\n\n---\n\n' + (m.content||'')) : (m.content||m.text||'');
  pg.innerHTML=`
  <div class="dh">
    <button class="bk" id="bk">←</button>
    <h2>${isMental ? '🧩 心智模型' : '详情'}</h2>
  </div>
  <div class="dt">
    <div class="txt">${h(txt)}</div>
    ${es.length?`<div class="tags">${es.slice(0,8).map(e=>`<span class="tag">${h(e)}</span>`).join('')}</div>`:''}
    ${ts?`<div class="time">${ts}</div>`:''}
  </div>`;
  document.getElementById('bk').onclick=()=>showList(isMental ? 'mental_model' : (m.fact_type||'all'));
}

async function load(skipList){
  try {
    statsCache = await ap('GET','/api/stats');
    const el = document.getElementById('hst');
    if (el) el.textContent = `共 ${statsCache.total_nodes} 条`;
    updateStatusBar(`共 ${statsCache.total_nodes} 条`, '#8b8fa3');
    showHome();
  } catch(e){ statsCache = null; }

  if(!skipList){
    try {
      const d = await ap('GET','/api/mental-models');
      mentalModels = d.items||[];
    } catch(e){ mentalModels=[]; }
  }
  if(!skipList && !allMemories.length){
    try {
      const d = await ap('GET','/api/memories/list?limit=10000');
      allMemories = d.memories||d.data||d.items||d.results||[];
    } catch(e){ allMemories=[]; }
  }
  const total = Math.max(statsCache?.total_nodes||0, allMemories.length);
  updateStatusBar(`共 ${total} 条`, '#8b8fa3');
  showHome();
  checkVersion();
}

// ───── 自动刷新 ─────
let autoRefreshTimer = null;
let refreshIntervalMs = 5 * 60 * 1000;

function startAutoRefresh(ms) {
  if (ms && ms > 0) refreshIntervalMs = ms;
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(async () => {
    try {
      const [s, mm] = await Promise.all([
        ap('GET','/api/stats'),
        ap('GET','/api/mental-models').catch(()=>({items:[]}))
      ]);
      statsCache = s;
      mentalModels = mm.items||[];
      const hm = document.getElementById('hm');
      if (hm) {
        updateStatusBar(`共 ${s.total_nodes} 条`, '#8b8fa3');
        showHome();
      }
    } catch(e) {}
  }, refreshIntervalMs);
}

window.hsSetRefreshInterval = function(ms) {
  startAutoRefresh(ms);
};

// ───── 版本检查 ─────
let verState = { current: null, latest: null, hasUpdate: false };

async function checkVersion(){
  const el = document.getElementById('hver');
  if(!el) return;
  try {
    const d = await ap('GET','/check-update');
    verState.current = d.current;
    verState.latest = d.latest;
    verState.hasUpdate = d.has_update;
    el.innerHTML = `v${h(d.current)}`;
    if(d.has_update){
      el.innerHTML += `<span class="badge" onclick="window.webkit?window.webkit.messageHandlers.hsAction.postMessage('check'):location.reload()">⬆ v${h(d.latest)} 可用</span>`;
    }
    if(d.error) console.warn('版本检查:', d.error);
  } catch(e){
    const cur = verState.current;
    el.innerHTML = cur ? `v${h(cur)}` : '';
  }
}

setInterval(checkVersion, 2 * 60 * 60 * 1000);

// ───── 搜索（语义搜索 → 后端 /recall） ─────
let searchTimer = null;
document.getElementById('sq').addEventListener('input', function(){
  const q = this.value.trim();
  if(!q){ showHome(); return; }
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    try {
      const d = await ap('POST','/api/memories/recall', {query: q, limit: 30});
      const items = d.results || d.items || d.memories || [];
      pg.innerHTML=`<div class="dh"><h2>搜索: ${h(q)}</h2><span class="n">${items.length}</span></div><div class="ml">${items.map(m=>{
        const txt = m.text || m.content || '';
        const ts = m.date ? new Date(m.date).toLocaleDateString('zh-CN') : '';
        return `<div class="mi" onclick="showDetail('${(m.id||m.memory_id||'').replace(/'/g,"\\'")}')"><div class="tx">${h(txt.slice(0,160))}${txt.length>160?'...':''}</div><div class="mt"><span class="tm">${ts}</span></div></div>`;
      }).join('')}</div>`;
    } catch(e) {
      pg.innerHTML=`<div class="dh"><h2>搜索失败</h2></div>`;
    }
  }, 300); // 300ms 防抖
});

document.getElementById('sr').onclick=()=>{ load(); };

load();

// 自动重试：如果初始 load 失败，每 3 秒重试一次直到成功
(function retryLoadOnFail() {
  setTimeout(async () => {
    if (!statsCache || !statsCache.total_nodes) {
      console.log('🔄 数据未就绪，自动重试...');
      try {
        const s = await ap('GET','/api/stats');
        if (s && s.total_nodes) {
          statsCache = s;
          showHome();
          updateStatusBar(`共 ${s.total_nodes} 条`, '#8b8fa3');
          document.getElementById('hst').textContent = `共 ${s.total_nodes} 条`;
          return;
        }
      } catch(e) {}
      retryLoadOnFail();
    }
  }, 3000);
})();

startAutoRefresh();
</script>
</body>
</html>
